<svg xmlns="http://www.w3.org/2000/svg" width="180" height="48" viewBox="0 0 180 48" role="img" aria-label="Vala Tech 2026 LLC">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8334a"/>
      <stop offset="100%" stop-color="#c01030"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2563b0"/>
      <stop offset="100%" stop-color="#1a3f7a"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d42840"/>
      <stop offset="100%" stop-color="#1e4a90"/>
    </linearGradient>
  </defs>

  <!-- Icon: 3 overlapping geometric pieces, clean Airalo-style -->
  <!-- Left red bar (tall) -->
  <rect x="0" y="4" width="11" height="40" rx="3" fill="url(#g1)"/>
  <!-- Middle gradient bar (medium) -->
  <rect x="7" y="12" width="11" height="32" rx="3" fill="url(#g3)"/>
  <!-- Right blue bar (short, offset) -->
  <rect x="14" y="20" width="11" height="24" rx="3" fill="url(#g2)"/>

  <!-- Wordmark -->
  <text x="34" y="29" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#2d2d2d" letter-spacing="0.3">Vala Tech</text>
  <text x="35" y="43" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#6b7280" letter-spacing="0.5">2026 LLC</text>
</svg>
